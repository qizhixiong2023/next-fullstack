services:
  postgres:
    image: postgres:16-alpine
    container_name: next_fullstack_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: next_fullstack
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
